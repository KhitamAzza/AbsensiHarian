<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Harian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5; color: #1a1a1a; padding-bottom: 120px;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 600px; margin: 0 auto; padding: 16px; }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 28px 16px; text-align: center;
      margin: -16px -16px 20px -16px; border-radius: 0 0 24px 24px;
    }
    .header h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .header .date { opacity: 0.9; font-size: 0.9rem; }

    .status-card {
      background: white; border-radius: 16px; padding: 16px;
      margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; align-items: center; gap: 14px;
    }
    .status-icon {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .status-icon.load { background: #fef3c7; }
    .status-icon.ok  { background: #d1fae5; }
    .status-icon.err { background: #fee2e2; }

    .btn {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform .1s, opacity .2s; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn-main {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
      box-shadow: 0 4px 12px rgba(118,75,162,0.25);
    }
    .btn-sync {
      background: #10b981; color: white;
      box-shadow: 0 4px 12px rgba(16,185,129,0.25);
    }

    .pending-box {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 14px; font-size: 0.85rem; color: #9a3412;
      display: none; align-items: center; gap: 8px;
    }
    .pending-box.active { display: flex; }

    .section-title {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em;
      color: #6b7280; margin: 24px 0 12px 0; font-weight: 700;
    }

    .student-card {
      background: white; border-radius: 14px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: transform .1s;
    }
    .student-card:active { transform: scale(0.99); }
    .student-info h3 { font-size: 1rem; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
    .student-info .kelas { font-size: 0.8rem; color: #6b7280; }
    .student-status { text-align: right; }
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700;
    }
    .b-alpha { background: #fee2e2; color: #991b1b; }
    .b-sakit { background: #dbeafe; color: #1e40af; }
    .b-izin  { background: #fef3c7; color: #92400e; }
    .ket { font-size: 0.75rem; color: #6b7280; margin-top: 3px; }
    .pending-tag {
      font-size: 0.6rem; background: #f59e0b; color: white;
      padding: 2px 6px; border-radius: 4px; font-weight: 700;
    }

    .empty {
      text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 0.9rem;
    }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 1000; opacity: 0; transition: opacity .25s;
    }
    .overlay.open { display: flex; opacity: 1; }
    .sheet {
      background: white; width: 100%; max-width: 600px;
      border-radius: 24px 24px 0 0; padding: 20px 16px 36px 16px;
      transform: translateY(100%); transition: transform .3s ease-out;
      max-height: 92vh; overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .sheet-header h2 { font-size: 1.2rem; }
    .x-btn {
      background: #f3f4f6; border: none; width: 38px; height: 38px;
      border-radius: 50%; font-size: 1.1rem; cursor: pointer;
    }

    .field { margin-bottom: 16px; position: relative; }
    .field label {
      display: block; font-size: 0.85rem; font-weight: 700;
      margin-bottom: 6px; color: #374151;
    }
    .field input, .field select {
      width: 100%; padding: 14px; border: 2px solid #e5e7eb;
      border-radius: 12px; font-size: 1rem; background: white;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #667eea; }
    .field input:disabled { background: #f9fafb; color: #6b7280; }

    .suggest {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: white; border: 1px solid #e5e7eb; border-radius: 12px;
      max-height: 220px; overflow-y: auto; box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      z-index: 200; display: none;
    }
    .suggest.open { display: block; }
    .suggest-item {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid #f3f4f6;
      font-size: 0.95rem;
    }
    .suggest-item:hover { background: #f9fafb; }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item span { color: #9ca3af; font-size: 0.8rem; margin-left: 4px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #1f2937; color: white; padding: 12px 24px;
      border-radius: 12px; font-size: 0.9rem; z-index: 3000;
      transition: transform .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Absensi Harian</h1>
      <div class="date" id="currentDate">-</div>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-icon load" id="statusIcon">⏳</div>
      <div>
        <div style="font-weight:700;" id="statusTitle">Memeriksa...</div>
        <div style="font-size:0.85rem;color:#6b7280;" id="statusDesc">Sedang menyiapkan kolom hari ini</div>
      </div>
    </div>

    <button class="btn btn-main" id="btnInput" disabled onclick="openModal()">
      ✏️ Input Absensi
    </button>

    <div class="pending-box" id="pendingBox">
      📦 <strong id="pendingCount">0</strong> data belum tersinkron. Tekan tombol hijau di bawah untuk kirim ke Spreadsheet.
    </div>

    <button class="btn btn-sync" id="btnSync" style="display:none;" onclick="syncData()">
      📤 Submit Laporan
    </button>

    <div class="section-title">Sudah Diabsen Hari Ini</div>
    <div id="listBox">
      <div class="empty">Belum ada data absensi</div>
    </div>
  </div>

  <div class="overlay" id="modal" onclick="closeModalOut(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <h2>Input Absensi</h2>
        <button class="x-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="field">
        <label>Nama</label>
        <input type="text" id="inNama" placeholder="Ketik nama..." autocomplete="off"
               oninput="filterNama()" onfocus="filterNama()">
        <div class="suggest" id="suggest"></div>
      </div>

      <div class="field">
        <label>Kelas</label>
        <input type="text" id="inKelas" placeholder="-" disabled>
      </div>

      <div class="field">
        <label>Status</label>
        <select id="inStatus">
          <option value="">Pilih status...</option>
          <option value="ALPHA">ALPHA</option>
          <option value="SAKIT">SAKIT</option>
          <option value="IZIN">IZIN</option>
        </select>
      </div>

      <div class="field">
        <label>Keterangan <span style="font-weight:400;color:#9ca3af;">(opsional)</span></label>
        <input type="text" id="inKet" placeholder="Contoh: demam, urusan keluarga...">
      </div>

      <button class="btn btn-main" onclick="saveLocal()">💾 Simpan ke Lokal</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════
// CONFIG: Replace with your GAS Web App URL
// ═══════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxEOU-SnORm2EG6Na5mU0x-8VvH0YB32mkP52cey3JqlsS3hgFdSA2ddq-lB8Eg--y8/exec';
// ═══════════════════════════════════════

const LS = d => `absensi_${d}`;
let students = [], todayDate = '', sheetData = [];

document.addEventListener('DOMContentLoaded', () => {
  const opt = { day:'numeric', month:'long', year:'numeric' };
  todayDate = new Date().toLocaleDateString('id-ID', opt);
  document.getElementById('currentDate').textContent = todayDate;

  checkToday();
  loadStudents();
});

/* ─── API: ALL requests go through POST with action in body ─── */
async function api(action, payload = {}) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...payload })
  });
  return res.json();
}

/* ─── Data calls ─── */
async function checkToday() {
  try {
    const r = await api('checkToday');
    if (r.available) {
      setStatus('ok','Siap Input',`Kolom ${r.date} tersedia`);
      document.getElementById('btnInput').disabled = false;
      loadToday();
    } else {
      setStatus('err','Gagal', r.error || 'Tidak bisa membuat kolom');
    }
  } catch (e) {
    setStatus('err','Error', e.message);
  }
}

async function loadStudents() {
  try {
    const r = await api('getStudents');
    students = r.students || [];
  } catch (e) { console.error(e); }
}

async function loadToday() {
  try {
    const r = await api('getTodayData', { date: todayDate });
    sheetData = r.data || [];
    render();
    updatePending();
  } catch (e) { console.error(e); }
}

async function syncData() {
  const key = LS(todayDate);
  const data = JSON.parse(localStorage.getItem(key) || '{}');
  const keys = Object.keys(data);
  if (!keys.length) { toast('Tidak ada data pending'); return; }

  const btn = document.getElementById('btnSync');
  btn.disabled = true; btn.innerHTML = '⏳ Mengirim...';

  try {
    const r = await api('submitLaporan', { date: todayDate, attendance: data });
    btn.disabled = false; btn.innerHTML = '📤 Submit Laporan';
    if (r.success) {
      localStorage.removeItem(key);
      toast('✅ Laporan terkirim!');
      loadToday();
    } else {
      toast('❌ Gagal: ' + (r.message||'unknown'));
    }
    updatePending();
  } catch (e) {
    btn.disabled = false; btn.innerHTML = '📤 Submit Laporan';
    toast('❌ Error: ' + e.message);
  }
}
    /* ─── UI helpers ─── */
    function setStatus(type, title, desc) {
      const icon = document.getElementById('statusIcon');
      icon.className = 'status-icon ' + (type==='ok'?'ok':type==='err'?'err':'load');
      icon.textContent = type==='ok'?'✅':type==='err'?'❌':'⏳';
      document.getElementById('statusTitle').textContent = title;
      document.getElementById('statusDesc').textContent = desc;
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* ─── Modal ─── */
    function openModal() {
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('inNama').focus(), 100);
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
      resetForm();
    }
    function closeModalOut(e) { if (e.target.id === 'modal') closeModal(); }

    function resetForm() {
      document.getElementById('inNama').value = '';
      document.getElementById('inKelas').value = '';
      document.getElementById('inStatus').value = '';
      document.getElementById('inKet').value = '';
      document.getElementById('suggest').classList.remove('open');
    }

    /* ─── Predictive Nama ─── */
    function filterNama() {
      const v = document.getElementById('inNama').value.toLowerCase().trim();
      const box = document.getElementById('suggest');
      if (!v) { box.classList.remove('open'); return; }
      const filtered = students.filter(s => s.nama.toLowerCase().includes(v));
      if (!filtered.length) { box.classList.remove('open'); return; }
      box.innerHTML = filtered.map(s =>
        `<div class="suggest-item" onclick="pickNama('${s.nama}','${s.kelas}')">
          ${s.nama}<span>• ${s.kelas}</span>
        </div>`
      ).join('');
      box.classList.add('open');
    }

    function pickNama(nama, kelas) {
      document.getElementById('inNama').value = nama;
      document.getElementById('inKelas').value = kelas;
      document.getElementById('suggest').classList.remove('open');
    }

    /* ─── Save to localStorage ─── */
    function saveLocal() {
      const nama = document.getElementById('inNama').value.trim();
      const kelas = document.getElementById('inKelas').value.trim();
      const status = document.getElementById('inStatus').value;
      const ket = document.getElementById('inKet').value.trim();

      if (!nama) { toast('Nama wajib diisi'); return; }
      if (!status) { toast('Status wajib dipilih'); return; }

      const key = LS(todayDate);
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      data[nama] = { status, keterangan: ket, kelas };
      localStorage.setItem(key, JSON.stringify(data));

      toast('✅ Disimpan (lokal)');
      closeModal();
      render();
      updatePending();
    }

    /* ─── Render list ─── */
    function render() {
      const key = LS(todayDate);
      const local = JSON.parse(localStorage.getItem(key) || '{}');
      const box = document.getElementById('listBox');

      const merged = {};
      sheetData.forEach(d => {
        const p = d.value.split(' - ');
        merged[d.nama] = { nama:d.nama, kelas:d.kelas, status:p[0], ket:p[1]||'', src:'sheet' };
      });
      for (const [n, item] of Object.entries(local)) {
        merged[n] = { nama:n, kelas:item.kelas, status:item.status, ket:item.keterangan||'', src:'local' };
      }

      const items = Object.values(merged);
      if (!items.length) {
        box.innerHTML = '<div class="empty">Belum ada data absensi</div>'; return;
      }

      box.innerHTML = items.map(it => {
        const bc = it.status==='ALPHA'?'b-alpha':it.status==='SAKIT'?'b-sakit':'b-izin';
        const pending = it.src==='local' ? '<span class="pending-tag">PENDING</span>' : '';
        const ket = it.ket ? `<div class="ket">${it.ket}</div>` : '';
        return `
          <div class="student-card" onclick="editStudent('${it.nama}','${it.kelas}','${it.status}','${it.ket}')">
            <div class="student-info">
              <h3>${it.nama} ${pending}</h3>
              <div class="kelas">${it.kelas}</div>
            </div>
            <div class="student-status">
              <span class="badge ${bc}">${it.status}</span>
              ${ket}
            </div>
          </div>`;
      }).join('');
    }

    function editStudent(nama, kelas, status, ket) {
      document.getElementById('inNama').value = nama;
      document.getElementById('inKelas').value = kelas;
      document.getElementById('inStatus').value = status;
      document.getElementById('inKet').value = ket || '';
      openModal();
    }

    function updatePending() {
      const key = LS(todayDate);
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      const n = Object.keys(data).length;
      document.getElementById('pendingCount').textContent = n;
      document.getElementById('pendingBox').classList.toggle('active', n > 0);
      document.getElementById('btnSync').style.display = n > 0 ? 'flex' : 'none';
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.field')) document.getElementById('suggest').classList.remove('open');
    });
  </script>
</body>
</html>
